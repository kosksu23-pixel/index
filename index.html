<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker Dark</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #222; width: 350px; text-align: center; }
        h1 { color: #d4af37; font-size: 22px; margin-bottom: 30px; letter-spacing: 1px; }
        select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 25px; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #000; }
        .btn-start { background: #d4af37; }
        .btn-end { background: #333; color: #fff; border: 1px solid #444; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        #status { margin-top: 20px; font-size: 14px; color: #888; }
    </style>
</head>
<body>
<div class="card">
    <h1>TRAINING LOG v</h1>
    <select id="player">
        <option value="" disabled selected>КТО ТРЕНИРУЕТСЯ?</option>
        <option value="Катя">zhalou(Катя)</option>
        <option value="Саша (ChattMa)">ChattMa(Саша)</option>
        <option value="Blessed">Blessed(Егор)</option>
        <option value="Gerader">Gerader(Коля)</option>
    </select>
    <div class="btn-group">
        <button class="btn-start" onclick="send('START')">START</button>
        <button class="btn-end" onclick="send('END')">END</button>
    </div>
    <div id="status"></div>
</div>
<script>
    const URL = "https://script.google.com/macros/s/AKfycbyyxfPHVpINSUjxSKE2AuUKQu1C77HOqXxYjp1kDNUhLd9xCwwxU11CEHVU6sJfNthRmQ/exec";
    async function send(act) {
        const name = document.getElementById('player').value;
        if(!name) return alert("Выбери имя!");
        document.getElementById('status').innerText = "Связь с базой...";
        await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({playerName: name, action: act}) });
        document.getElementById('status').innerText = act === 'START' ? "Удачи! Время пошло." : "Тренировка окончена. Данные в таблице.";
    }
</script>
</body>
</html>
